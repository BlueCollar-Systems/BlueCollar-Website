name: website-ci

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "17 */6 * * *"
  repository_dispatch:
    types:
      - product-update
      - product-release
      - steel-shapes-update
      - steel-shapes-release
  pull_request:
  workflow_dispatch:

concurrency:
  group: website-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify repo_context_builder_core.py hash
        run: |
          EXPECTED_SHA="8fe18c896c63372b5c2d7c17c383b548e9573c9b7592019cd72159f2b08505de"
          test -f repo_context_builder_core.py || { echo "ERROR: repo_context_builder_core.py missing"; exit 1; }
          ACTUAL_SHA=$(sha256sum repo_context_builder_core.py | awk '{print $1}')
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "ERROR: repo_context_builder_core.py hash mismatch"
            echo "expected=$EXPECTED_SHA"
            echo "actual=$ACTUAL_SHA"
            exit 1
          fi

      - name: Validate index.html basics
        run: |
          python - <<'PY'
          from pathlib import Path

          pages = {
              "index.html": [
                  "<!DOCTYPE html>",
                  "<title>",
                  'meta name="description"',
                  "support@bluecollar-systems.com",
              ],
              "feedback.html": [
                  "<!DOCTYPE html>",
                  "<title>",
                  'meta name="description"',
                  "support@bluecollar-systems.com",
              ],
          }

          for page, tokens in pages.items():
              path = Path(page)
              if not path.exists():
                  raise SystemExit(f"{page} not found")
              text = path.read_text(encoding="utf-8")
              missing = [t for t in tokens if t not in text]
              if missing:
                  raise SystemExit(f"{page} missing required tokens: {missing}")

          print("Static HTML checks passed.")
          PY

      - name: Validate sitemap completeness
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.parse import urlparse
          import xml.etree.ElementTree as ET

          sitemap = Path("sitemap.xml")
          if not sitemap.exists():
              raise SystemExit("sitemap.xml not found")

          tree = ET.parse(sitemap)
          root = tree.getroot()
          ns = {"sm": "http://www.sitemaps.org/schemas/sitemap/0.9"}

          listed_paths = set()
          for loc in root.findall("sm:url/sm:loc", ns):
              value = (loc.text or "").strip()
              if not value:
                  continue
              parsed = urlparse(value)
              path = parsed.path or "/"
              if path.endswith("/") and path != "/":
                  path = path[:-1]
              listed_paths.add(path)

          html_files = sorted(
              p for p in Path(".").glob("*.html") if p.name.lower() != "404.html"
          )
          missing = []
          for html in html_files:
              route = "/" if html.name == "index.html" else f"/{html.stem}"
              if route not in listed_paths:
                  missing.append(f"{html.name} -> {route}")

          if missing:
              raise SystemExit(
                  "sitemap.xml is missing page entries:\n" + "\n".join(missing)
              )

          print("Sitemap completeness check passed.")
          PY

      - name: Validate dynamic release link policy
        run: |
          python - <<'PY'
          from pathlib import Path

          checked_files = ["index.html", "shapes.html"]
          banned = "/releases/download/v"
          violations = []
          for name in checked_files:
              text = Path(name).read_text(encoding="utf-8")
              if banned in text:
                  violations.append(name)

          if violations:
              raise SystemExit(
                  "Found hardcoded versioned GitHub release links in: "
                  + ", ".join(violations)
              )

          print("Dynamic release link policy check passed.")
          PY

      - name: Build repository metadata snapshot
        env:
          GH_TOKEN: ${{ secrets.REPO_METADATA_TOKEN || secrets.WEBSITE_DISPATCH_TOKEN || secrets.BLUECOLLAR_WEBSITE_DISPATCH_TOKEN || secrets.REPO_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
        run: python tools/sync_repo_metadata.py

  deploy-pages:
    needs: static-checks
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'schedule' ||
      github.event_name == 'repository_dispatch' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build repository metadata snapshot
        env:
          GH_TOKEN: ${{ secrets.REPO_METADATA_TOKEN || secrets.WEBSITE_DISPATCH_TOKEN || secrets.BLUECOLLAR_WEBSITE_DISPATCH_TOKEN || secrets.REPO_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
        run: python tools/sync_repo_metadata.py

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          account_id = os.environ.get("CLOUDFLARE_ACCOUNT_ID", "").strip()
          token = os.environ.get("CLOUDFLARE_API_TOKEN", "").strip()
          if not account_id:
              print("::error::CLOUDFLARE_ACCOUNT_ID is missing.")
              raise SystemExit(1)
          if not token:
              print("::error::No Cloudflare API token secret found. Configure CLOUDFLARE_PAGES_API_TOKEN, CLOUDFLARE_API_TOKEN, or CF_API_TOKEN.")
              raise SystemExit(1)

          url = f"https://api.cloudflare.com/client/v4/accounts/{account_id}/pages/projects/bluecollar-website"
          req = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/json",
                  "User-Agent": "bluecollar-website-ci/1.0",
              },
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  data = json.loads(resp.read().decode("utf-8"))
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", errors="replace")
              print("::error::Cloudflare auth precheck failed. Update the deploy token with at least Account > Cloudflare Pages:Edit and Account Settings:Read permissions for this account.")
              print(body)
              raise SystemExit(1)

          if not data.get("success"):
              print("::error::Cloudflare auth precheck returned an unsuccessful response. Update token permissions (Account > Cloudflare Pages:Edit and Account Settings:Read).")
              print(json.dumps(data))
              raise SystemExit(1)

          print("Cloudflare deploy credentials validated.")
          PY
          npx --yes wrangler@4.83.0 pages deploy . --project-name bluecollar-website --branch main
