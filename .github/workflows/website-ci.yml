name: website-ci

on:
  push:
    branches:
      - main
      - master
  repository_dispatch:
    types:
      - steel-shapes-update
      - steel-shapes-release
  pull_request:
  workflow_dispatch:

concurrency:
  group: website-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate index.html basics
        run: |
          python - <<'PY'
          from pathlib import Path

          pages = {
              "index.html": [
                  "<!DOCTYPE html>",
                  "<title>",
                  'meta name="description"',
                  "support@bluecollar-systems.com",
              ],
              "feedback.html": [
                  "<!DOCTYPE html>",
                  "<title>",
                  'meta name="description"',
                  "support@bluecollar-systems.com",
              ],
          }

          for page, tokens in pages.items():
              path = Path(page)
              if not path.exists():
                  raise SystemExit(f"{page} not found")
              text = path.read_text(encoding="utf-8")
              missing = [t for t in tokens if t not in text]
              if missing:
                  raise SystemExit(f"{page} missing required tokens: {missing}")

          print("Static HTML checks passed.")
          PY

  deploy-pages:
    needs: static-checks
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'repository_dispatch' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4.48.0 pages deploy . --project-name bluecollar-website --branch main
